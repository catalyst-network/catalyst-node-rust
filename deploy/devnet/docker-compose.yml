# deploy/devnet/docker-compose.yml

services:
  ipfs:
    image: ipfs/kubo:latest
    container_name: devnet-ipfs
    restart: unless-stopped
    environment:
      IPFS_PROFILE: server
    ports:
      - "5001:5001"  # IPFS API
      - "8080:8080"  # IPFS Gateway
    volumes:
      - ipfs:/data/ipfs
    healthcheck:
      # Use ipfs CLI so we don't need curl/wget in the image
      test: ["CMD-SHELL", "ipfs --api /ip4/127.0.0.1/tcp/5001 id >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  node-a:
    build:
      context: ../../
    image: catalyst/node:dev
    # No ipfs flag (binary doesn't support it); minimal required flag is --rpc-port
    command: ["start", "--rpc-port", "9001"]
    environment:
      RUST_LOG: info
    ports:
      - "9001:9001"
    restart: unless-stopped

  node-b:
    image: catalyst/node:dev
    # Start a second node on a different RPC port
    command: ["start", "--rpc-port", "9002"]
    environment:
      RUST_LOG: info
    ports:
      - "9002:9002"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - node-a
      - node-b

volumes:
  ipfs:
